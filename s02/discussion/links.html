<body>
	<h1>HTML Hyperlinks</h1>

	<p>HTML Hyperlinks are created using the anchor tag.</p>

	<h3>There are two kind of links: </h3>

     <ul>
     	<li>Absolute Link </li>
     	<li>Relative Link </li>

    </ul>
     <div>
     	<! -- Absolute links are links to pages in other websites. It is used together with the href to define the location or address of the link to be redirected. -->

      <h4>Absolute Links</h4>
      <a href="https://zuitt.co/" target ="_blank">Zuitt Coding Bootcamp</a>
      <a href="https://www.linkedin.com/feed/" target ="_blank">LinkedIn</a>


     </div>

     <div>
     	 <h4> Relative Links</h4>

     	 <a href="./attributes.html">Attributes Page</a>
     	 <a href="./links.html">Links Page</a>
     	 <a href=".index.html">Home Page</a> 
     </div>

     <div>

        <br>

     </div>

      </div>
